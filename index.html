<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Pokedex - Dylan BOLADO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="errorMessage" class="error-toast">Pokémon non trouvé !</div>

    <div class="logo-container">
        <img src="Pokédex_logo.png" alt="Logo" class="pokedex-logo">
    </div>
    
    <div class="main-frame">
        <header class="header-red">
            <h1>My Pokedex</h1>
        </header>

        <div class="content">
            <div class="search-section">
                <input type="text" id="pokemonInput" placeholder="Nom ou ID du Pokémon...">
                <button id="searchBtn">Chercher</button>
            </div>

            <div class="history-section">
                <h3>Historique</h3>
                <ul id="historyList" class="pokemon-grid"></ul>
            </div>

            <div class="separator">
                <div class="title-with-btn">
                    <h3>Recommandations</h3>
                    <button id="refreshRecommendations">&#8635;</button>
                </div>
                <div id="randomList" class="pokemon-grid"></div>
            </div>

            <div class="separator">
                <h3>Mes Favoris</h3>
                <div id="favoritesList" class="pokemon-grid"></div>
            </div>
        </div>
    </div>

    <div id="pokemonModal">
        <div id="loadingSpinner" class="spinner"></div>
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
