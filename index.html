<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Pokedex - Dylan BOLADO</title> 

    <link rel="icon" type="image/png" href="pokeball_icon.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>My Pokedex</h1>

    <section>
        <input type="text" id="pokemonInput" placeholder="Pokemon name or ID...">
        <button id="searchBtn">Search</button>
    </section>

    <section>
        <h3>Search History</h3>
        <ul id="historyList"></ul>
    </section>

    <div id="pokemonCard"></div>

    <section>
        <h3>Recommendations</h3>
        <div id="randomList"></div>
    </section>

    <section>
        <h3>My Favorites</h3>
        <div id="favoritesList"></div>
    </section>

    <div id="pokemonModal" style="display:none;">
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
