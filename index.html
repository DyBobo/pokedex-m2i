<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex - Dylan BOLADO</title> 
    <link rel="icon" type="image/png" href="pokeball_icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="errorMessage" class="error-toast">Pokémon not found !</div>

    <div class="logo-container">
        <img src="Pokédex_logo.png" alt="Pokedex Logo" class="pokedex-logo">
    </div>
    
    <div class="main-frame">
        <header class="header-red">
            <h1>My Pokedex</h1>
        </header>

        <div class="content">
            <section class="search-section">
                <input type="text" id="pokemonInput" placeholder="Pokemon name or ID...">
                <button id="searchBtn">Search</button>
            </section>

            <section class="history-section">
                <h3>Search History</h3>
                <ul id="historyList" class="pokemon-grid"></ul>
            </section>

            <div id="pokemonCard"></div>

            <section class="separator">
                <div class="title-with-btn">
                    <h3>Recommendations</h3>
                    <button id="refreshRecommendations" title="Changer les recommandations">
                        &#8635;
                    </button>
                </div>
                <div id="randomList" class="pokemon-grid"></div>
            </section>

            <section class="separator">
                <h3>My Favorites</h3>
                <div id="favoritesList" class="pokemon-grid"></div>
            </section>
        </div>
    </div>

    <div id="pokemonModal">
        <div id="loadingSpinner" class="spinner" style="display: none;"></div>

        <div class="modal-content" id="modalContent">
            <span id="closeModal">&times;</span>
            <div id="modalDetails"></div>
            
            <div id="evolutionSection" class="separator" style="display: none;">
                <h4>Evolutions</h4>
                <div id="evolutionList" class="pokemon-grid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
